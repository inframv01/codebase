name: E2E Tests (Playwright)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: 20

jobs:
  # ============================================================================
  # E2E TESTS: Playwright browser automation (optional approval gate)
  # ============================================================================
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: maldideliv_test
          POSTGRES_USER: app_gm_user
          POSTGRES_PASSWORD: sx3!asvc!asd12
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php-action@v2
        with:
          php-version: 8.3
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: |
            frontend/node_modules
            backend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'backend/package.json') }}

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: |
          npm ci --prefix frontend
          npm install --ignore-scripts --prefix backend

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U app_gm_user; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Setup Laravel environment
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: maldideliv_test
          DB_USERNAME: app_gm_user
          DB_PASSWORD: sx3!asvc!asd12
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate:refresh --force

      - name: Build backend assets
        working-directory: backend
        run: npm run build

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start Laravel server in background
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: maldideliv_test
          DB_USERNAME: app_gm_user
          DB_PASSWORD: sx3!asvc!asd12
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 > server.log 2>&1 &
          sleep 2
          until curl -s http://127.0.0.1:8000/up > /dev/null; do
            echo "Waiting for Laravel server..."
            sleep 1
          done

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run test:e2e
        continue-on-error: true
        env:
          VITE_API_URL: http://127.0.0.1:8000/api/v1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Publish Playwright test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Test Results
          path: frontend/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Comment PR with E2E status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ job.status }}' === 'success' ? '✅' : '⚠️'
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${result} **E2E Tests** (Playwright)\n\nThis is an optional approval gate. Merge is allowed regardless of E2E status, but review failures before deploying to production.`
            })
