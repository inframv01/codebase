name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PHP_VERSION: 8.3
  NODE_VERSION: 20

jobs:
  # ============================================================================
  # SETUP: Cache dependencies
  # ============================================================================
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php-action@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
          coverage: xdebug

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: |
            frontend/node_modules
            backend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'backend/package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend Node dependencies
        working-directory: backend
        run: npm install --ignore-scripts

  # ============================================================================
  # LINT: PHP style, ESLint, TypeScript
  # ============================================================================
  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php-action@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Composer cache
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: |
            frontend/node_modules
            backend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'backend/package.json') }}

      - name: Run Laravel Pint (PHP style check)
        working-directory: backend
        run: ./vendor/bin/pint --check

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # ============================================================================
  # TYPE CHECK: TypeScript compiler
  # ============================================================================
  type-check:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: TypeScript type check
        working-directory: frontend
        run: tsc -b

  # ============================================================================
  # UNIT TESTS: Pest (backend) + Vitest (frontend)
  # ============================================================================
  unit-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php-action@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
          coverage: xdebug

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Composer cache
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: |
            frontend/node_modules
            backend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'backend/package.json') }}

      - name: Run Pest unit tests
        working-directory: backend
        run: php artisan test --testsuite=Unit --coverage --coverage-clover=coverage.xml

      - name: Run Vitest (frontend)
        working-directory: frontend
        run: npm run test:unit -- --coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-reports
          path: |
            backend/coverage.xml
            frontend/coverage/

  # ============================================================================
  # BUILD: Vite builds for both backend and frontend
  # ============================================================================
  build:
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php-action@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Composer cache
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: |
            frontend/node_modules
            backend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'backend/package.json') }}

      - name: Build backend assets (Vite)
        working-directory: backend
        run: npm run build

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: |
            backend/public/build/
            frontend/dist/

  # ============================================================================
  # INTEGRATION TESTS: API tests with PostgreSQL
  # ============================================================================
  integration-tests:
    needs: [setup, unit-tests]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: maldideliv_test
          POSTGRES_USER: app_gm_user
          POSTGRES_PASSWORD: sx3!asvc!asd12
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:8432

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php-action@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
          coverage: xdebug

      - name: Restore Composer cache
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - name: Restore npm cache
        uses: actions/cache@v3
        with:
          path: backend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('backend/package.json') }}

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U app_gm_user; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Setup test environment
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: maldideliv_test
          DB_USERNAME: app_gm_user
          DB_PASSWORD: sx3!asvc!asd12
        run: |
          php artisan migrate:refresh --force

      - name: Run Pest feature tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: maldideliv_test
          DB_USERNAME: app_gm_user
          DB_PASSWORD: sx3!asvc!asd12
        run: php artisan test --testsuite=Feature --coverage --coverage-clover=coverage-integration.xml

      - name: Upload integration coverage
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-integration
          path: backend/coverage-integration.xml

  # ============================================================================
  # STATIC ANALYSIS: PHPStan (informational, not blocking)
  # ============================================================================
  static-analysis:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php-action@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Restore Composer cache
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - name: Install PHPStan
        working-directory: backend
        run: composer require --dev phpstan/phpstan phpstan/phpstan-laravel

      - name: Run PHPStan
        working-directory: backend
        run: ./vendor/bin/phpstan analyse app --level=5 || true

  # ============================================================================
  # SECURITY: Dependency scanning and secret detection
  # ============================================================================
  security:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php-action@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check for PHP security vulnerabilities
        working-directory: backend
        run: composer audit || true

      - name: Check for Node security vulnerabilities
        working-directory: frontend
        run: npm audit || true

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  # ============================================================================
  # FINAL STATUS: Overall CI success
  # ============================================================================
  ci-success:
    if: always()
    needs: [lint, type-check, unit-tests, build, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.type-check.result }}" == "failure" || \
                "${{ needs.unit-tests.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" || \
                "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          fi
          echo "✅ CI Pipeline Passed"

      - uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **CI Pipeline Passed**\n\n- [x] Linting\n- [x] Type Checking\n- [x] Unit Tests\n- [x] Build\n- [x] Integration Tests\n\n📋 E2E tests can be run separately. See the Playwright workflow for details.'
            })
