[build]
builder = "RAILPACK"
buildCommand = "composer install --no-dev --optimize-autoloader --no-interaction"


[deploy]
# Queue workers do not need a healthcheck; Railway only needs the process to stay alive.
startCommand = "php artisan config:clear && php artisan queue:work redis --sleep=3 --tries=3 --timeout=90"
restartPolicyType = "always"